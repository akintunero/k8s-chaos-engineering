[pytest]
testpaths = tests
pythonpath = src scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=k8s_chaos
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=0
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    k8s: Tests requiring Kubernetes cluster
