# Kustomize overlay for GitOps (Flux/Argo). Excludes catalog.yaml (metadata only).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hello-world-app

resources:
  - rbac.yaml
  - pod-delete.yaml
  - cpu-hog.yaml
  - memory-hog.yaml
  - network-latency.yaml
  - network-partition.yaml
  - disk-stress.yaml
  - custom-chaos.yaml
  - multi-cluster-chaos.yaml
  - chaos-workflow.yaml
  - network-policies.yaml
