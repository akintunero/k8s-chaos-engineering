apiVersion: v1
kind: ServiceAccount
metadata:
  name: litmus-admin
  namespace: hello-world-app
  labels:
    name: litmus-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-chaos-litmus-admin
  labels:
    name: litmus-admin
rules:
  - apiGroups: ["", "apps", "batch", "extensions", "litmuschaos.io"]
    resources:
      - pods
      - pods/log
      - deployments
      - jobs
      - replicasets
      - chaosengines
      - chaosexperiments
      - chaosresults
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-chaos-litmus-admin
  labels:
    name: litmus-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-chaos-litmus-admin
subjects:
  - kind: ServiceAccount
    name: litmus-admin
    namespace: hello-world-app
