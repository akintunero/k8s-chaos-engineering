apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: chaos-experiments
  namespace: flux-system
spec:
  interval: 30m
  path: ./experiments
  # Uses experiments/kustomization.yaml (excludes catalog.yaml)
  prune: false
  suspend: true
  sourceRef:
    kind: GitRepository
    name: k8s-chaos-engineering
  targetNamespace: hello-world-app
  timeout: 5m
  # Set suspend: false when you intend to apply ChaosEngine resources.
