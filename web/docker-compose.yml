services:
  backend:
    build:
      context: ..
      dockerfile: web/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      CHAOS_ENV: dev
      CORS_ORIGINS: http://localhost:3000,http://localhost
      # CHAOS_API_KEY: set-to-enable-auth
    volumes:
      - ${HOME}/.kube:/root/.kube:ro
    # Requires host kubeconfig for cluster operations

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
