# KinD cluster config for CI e2e and local testing.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: chaos-e2e
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "chaos-e2e=true"
