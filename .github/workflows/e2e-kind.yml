name: E2E (KinD)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: e2e-kind-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quickstart-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.24.0
          cluster_name: chaos-e2e
          config: hack/kind-cluster.yaml

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Run golden-path quickstart
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts
          CHAOS_DURATION: "60"
        run: ./hack/quickstart.sh

      - name: Upload quickstart report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-report
          path: reports/latest.json
          if-no-files-found: warn
