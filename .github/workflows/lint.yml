name: Lint and Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and linters
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run isort
        run: isort --check-only --profile black src/k8s_chaos

      - name: Run black
        run: black --check --target-version py311 src/k8s_chaos

      - name: Run flake8
        run: |
          flake8 src/k8s_chaos --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/k8s_chaos --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run mypy
        continue-on-error: true
        run: mypy src/k8s_chaos --ignore-missing-imports
