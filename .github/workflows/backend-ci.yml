name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "web/backend/**"
      - "src/**"
      - "scripts/**"
      - "config/**"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "web/backend/**"
      - "src/**"
      - "scripts/**"
      - "config/**"
      - "pyproject.toml"
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and backend deps
        run: |
          python -m pip install --upgrade pip
          chmod +x hack/ensure-dev-install.sh hack/sync-package-data.sh
          ./hack/ensure-dev-install.sh
          ./hack/sync-package-data.sh
          pip install -e .
          pip install -r web/backend/requirements.txt httpx

      - name: Import API module
        working-directory: web/backend
        run: python -c "from main import app; assert app.title"

      - name: Import loader
        working-directory: web/backend
        run: python -c "from loader import load_chaos_modules; load_chaos_modules()"
