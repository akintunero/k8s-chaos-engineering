name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "web/backend/**"
      - "scripts/**"
      - "config/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "web/backend/**"
      - "scripts/**"
      - "config/**"
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            scripts/requirements.txt
            web/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt -r web/backend/requirements.txt
          pip install httpx

      - name: Import API module
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts:${{ github.workspace }}/web/backend
        working-directory: web/backend
        run: python -c "from main import app; assert app.title"

      - name: Import loader
        env:
          PYTHONPATH: ${{ github.workspace }}/scripts:${{ github.workspace }}/web/backend
        working-directory: web/backend
        run: python -c "from loader import load_chaos_modules; load_chaos_modules()"
