name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  lint:
    uses: ./.github/workflows/lint.yml

  security:
    uses: ./.github/workflows/security.yml

  manifests:
    uses: ./.github/workflows/manifests.yml

  e2e-kind:
    uses: ./.github/workflows/e2e-kind.yml

  backend:
    uses: ./.github/workflows/backend-ci.yml

  ci-success:
    needs: [test, lint, security, manifests, e2e-kind, backend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "test: ${{ needs.test.result }}"
          echo "lint: ${{ needs.lint.result }}"
          echo "security: ${{ needs.security.result }}"
          echo "manifests: ${{ needs.manifests.result }}"
          echo "e2e-kind: ${{ needs.e2e-kind.result }}"
          echo "backend: ${{ needs.backend.result }}"
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.manifests.result }}" != "success" ] || \
             [ "${{ needs.e2e-kind.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" != "success" ]; then
            echo "One or more CI checks failed"
            exit 1
          fi
          echo "All CI checks passed"
